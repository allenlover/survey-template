<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>前測預覽 — 學術問卷</title>
  <style>
    /* ── Preview-specific ── */
    .preview-banner {
      position: fixed; top: 0; left: 0; right: 0;
      background: #2d3748; color: #fff;
      padding: 0 16px; height: 40px;
      display: flex; align-items: center; gap: 12px;
      z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,.25);
      font-size: 13px;
    }
    .banner-tag {
      background: #e53e3e; color: #fff;
      padding: 2px 8px; border-radius: 3px;
      font-size: 11px; font-weight: bold; letter-spacing: 1px;
    }
    .banner-scenario {
      font-family: monospace; font-weight: bold;
      font-size: 14px; letter-spacing: 1px;
    }
    .btn-switch {
      margin-left: auto;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      color: #fff; padding: 4px 12px; border-radius: 4px;
      cursor: pointer; font-size: 12px; font-family: inherit;
    }
    .btn-switch:hover { background: rgba(255,255,255,.25); }

    body { padding-top: 50px; }

    /* ── Picker ── */
    .picker-header { text-align: center; padding: 28px 0 20px; }
    .picker-header h1 { font-size: 22px; margin-bottom: 10px; }
    .picker-header p { font-size: 14px; color: #666; line-height: 1.7; }

    .combo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(258px, 1fr));
      gap: 14px; padding-bottom: 48px;
    }
    .combo-card {
      background: #fff; border-radius: 10px;
      padding: 18px 20px; box-shadow: 0 2px 10px rgba(0,0,0,.07);
      display: flex; flex-direction: column; gap: 10px;
    }
    .combo-num { font-size: 11px; color: #aaa; letter-spacing: 1px; }
    .combo-code {
      font-family: monospace; font-size: 18px;
      font-weight: bold; color: #5a7a6a;
    }
    .combo-factors { display: flex; flex-direction: column; gap: 5px; }
    .combo-factor {
      display: flex; justify-content: space-between;
      font-size: 13px; border-bottom: 1px solid #f5f5f5; padding-bottom: 4px;
    }
    .combo-factor:last-child { border-bottom: none; }
    .factor-name { color: #777; }
    .factor-level { font-weight: bold; color: #333; }
    .combo-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-start {
      flex: 1; background: #5a7a6a; color: #fff;
      padding: 9px 0; border-radius: 6px; border: none;
      cursor: pointer; font-size: 14px; font-family: inherit; font-weight: bold;
    }
    .btn-start:hover { background: #4a6a5a; }
    .btn-link {
      background: #f0ede8; color: #555; border: none;
      padding: 9px 12px; border-radius: 6px;
      cursor: pointer; font-size: 12px; font-family: inherit; white-space: nowrap;
    }
    .btn-link:hover { background: #e0dbd4; }

    /* ── Toast ── */
    .preview-toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #2d3748; color: #fff; padding: 10px 20px;
      border-radius: 6px; font-size: 13px; z-index: 2000;
      pointer-events: none; opacity: 0;
      transition: opacity .3s, transform .3s;
    }
    .preview-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Thankyou extra ── */
    .preview-actions {
      margin-top: 24px; display: flex; gap: 10px;
      justify-content: center; flex-wrap: wrap;
    }
    .preview-actions button {
      background: #5a7a6a; color: #fff; border: none;
      padding: 10px 22px; border-radius: 6px;
      cursor: pointer; font-size: 14px; font-family: inherit;
    }
    .preview-actions .btn-back-picker { background: #e8e4de; color: #555; }

    /* ════ FROM INDEX.HTML ════ */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Serif TC","Source Han Serif TC","Microsoft JhengHei",serif;
      background: #f0ede8; color: #1a1a1a; line-height: 1.9; font-size: 16px;
    }
    .container { max-width: 740px; margin: 0 auto; padding: 16px; }

    #progress-wrap {
      background: #ddd; border-radius: 4px; height: 6px;
      margin-bottom: 20px; overflow: hidden;
    }
    #progress-bar {
      height: 100%; background: #5a7a6a; border-radius: 4px;
      transition: width .4s ease; width: 0%;
    }
    #progress-label { font-size: 13px; color: #666; text-align: right; margin-bottom: 6px; }

    .card {
      background: #fff; border-radius: 10px; padding: 28px 32px;
      margin-bottom: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.07);
    }
    .part-label {
      font-size: 13px; font-weight: bold; color: #5a7a6a;
      letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase;
    }
    h2 {
      font-size: 18px; font-weight: bold; margin-bottom: 14px;
      border-bottom: 2px solid #e8e4de; padding-bottom: 10px;
    }
    .instruction {
      font-size: 14px; color: #444; margin-bottom: 16px;
      padding: 10px 14px; background: #f7f5f2;
      border-left: 3px solid #5a7a6a; border-radius: 4px;
    }
    .scenario-box {
      background: #fafaf8; border: 1px solid #e0dbd4; border-radius: 8px;
      padding: 20px 24px; margin-bottom: 20px;
      font-size: 15px; line-height: 2; white-space: pre-line;
    }

    .likert-item { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #f0ede8; }
    .likert-item:last-child { border-bottom: none; margin-bottom: 0; }
    .likert-question { font-size: 15px; margin-bottom: 10px; line-height: 1.7; }
    .likert-question .q-num { color: #5a7a6a; font-weight: bold; margin-right: 4px; }
    .likert-options { display: flex; gap: 6px; align-items: stretch; }
    .likert-option { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .likert-option input[type="radio"] { display: none; }
    .likert-option label {
      display: flex; flex-direction: column; align-items: center;
      gap: 5px; cursor: pointer; width: 100%;
    }
    .radio-circle {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid #ccc; background: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; font-size: 12px; color: #aaa;
    }
    .likert-option input[type="radio"]:checked + label .radio-circle {
      background: #5a7a6a; border-color: #5a7a6a; color: #fff;
    }
    .likert-option label:hover .radio-circle { border-color: #5a7a6a; }
    .radio-label { font-size: 11px; color: #888; text-align: center; line-height: 1.3; }

    .task-box {
      background: #f7f5f2; border: 1px solid #e0dbd4;
      border-radius: 8px; padding: 16px 20px; margin-bottom: 16px;
    }
    .task-title { font-size: 14px; font-weight: bold; text-align: center; margin-bottom: 10px; letter-spacing: 2px; }
    .task-description { font-size: 14px; margin-bottom: 10px; line-height: 1.7; }
    .task-note {
      font-size: 13px; color: #555; background: #fff;
      border: 1px solid #ddd; border-radius: 4px;
      padding: 8px 12px; margin-bottom: 14px; line-height: 1.6;
    }
    .task-field { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .task-field label { font-size: 14px; min-width: 110px; white-space: nowrap; }
    .task-field input[type="text"] {
      flex: 1; border: none; border-bottom: 1px solid #aaa;
      background: transparent; font-size: 15px; padding: 4px 2px;
      font-family: inherit; outline: none;
    }
    .task-field input[type="text"]:focus { border-bottom-color: #5a7a6a; }
    .task-field .opt-note { font-size: 12px; color: #999; }

    .demo-field { margin-bottom: 20px; }
    .demo-label { font-size: 15px; font-weight: bold; margin-bottom: 8px; display: block; }
    .demo-field input[type="number"] {
      width: 80px; border: 1px solid #ccc; border-radius: 4px;
      padding: 6px 10px; font-size: 15px; font-family: inherit;
    }
    .demo-unit { margin-left: 6px; font-size: 14px; color: #555; }
    .radio-group { display: flex; flex-wrap: wrap; gap: 10px; }
    .radio-chip input[type="radio"] { display: none; }
    .radio-chip label {
      display: inline-block; padding: 6px 16px;
      border: 1.5px solid #ccc; border-radius: 20px;
      cursor: pointer; font-size: 14px; transition: all .15s;
    }
    .radio-chip input[type="radio"]:checked + label {
      background: #5a7a6a; border-color: #5a7a6a; color: #fff;
    }

    .cover-header { text-align: center; margin-bottom: 24px; }
    .cover-title { font-size: 20px; font-weight: bold; line-height: 1.5; margin-bottom: 8px; }
    .cover-meta { font-size: 13px; color: #666; }
    .cover-body { font-size: 15px; margin-bottom: 16px; line-height: 1.9; }
    .cover-reminder {
      background: #f0ede8; border-radius: 6px;
      padding: 14px 18px; font-size: 14px; margin-top: 16px; line-height: 1.8;
    }

    .thankyou-wrap { text-align: center; padding: 30px 0; }
    .thankyou-wrap h2 { font-size: 22px; margin-bottom: 12px; border: none; }
    .thankyou-wrap p { font-size: 15px; color: #555; }

    .nav-wrap {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 20px; margin-bottom: 40px; gap: 12px;
    }
    .btn {
      padding: 12px 32px; border-radius: 6px; border: none;
      font-size: 15px; font-family: inherit; cursor: pointer; transition: all .15s;
    }
    .btn-prev { background: #e8e4de; color: #555; }
    .btn-prev:hover { background: #d8d4ce; }
    .btn-next { background: #5a7a6a; color: #fff; font-weight: bold; }
    .btn-next:hover { background: #4a6a5a; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .error-msg { color: #c0392b; font-size: 13px; margin-top: 8px; display: none; }

    #loading { text-align: center; padding: 60px 20px; font-size: 16px; color: #666; }

    @media (max-width: 500px) {
      .card { padding: 20px 16px; }
      .likert-options { gap: 3px; }
      .radio-circle { width: 28px; height: 28px; font-size: 10px; }
      .radio-label { font-size: 10px; }
      .task-field { flex-direction: column; align-items: flex-start; gap: 4px; }
      .task-field input[type="text"] { width: 100%; }
    }
  </style>
</head>
<body>

<!-- Fixed preview banner -->
<div class="preview-banner">
  <span class="banner-tag">前測</span>
  <span style="opacity:.6">腳本：</span>
  <span class="banner-scenario" id="banner-code">—</span>
  <button class="btn-switch" onclick="showPicker()">切換腳本 ↩</button>
</div>

<!-- Toast notification -->
<div class="preview-toast" id="toast"></div>

<div class="container">
  <div id="loading">載入中，請稍候…</div>

  <!-- Scenario picker -->
  <div id="picker" style="display:none"></div>

  <!-- Survey (same structure as index.html) -->
  <div id="app" style="display:none">
    <div id="progress-label"></div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <div id="survey-content"></div>
    <div class="nav-wrap" id="nav-wrap">
      <button class="btn btn-prev" id="btn-prev" onclick="prevPage()">← 上一頁</button>
      <span id="error-msg" class="error-msg">請完成所有必填題項再繼續。</span>
      <button class="btn btn-next" id="btn-next" onclick="nextPage()">下一頁 →</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  Survey Engine — Preview Edition
//  Reads config.json dynamically; lets researcher preview every
//  scenario combination without submitting data to Google Sheets.
//
//  Usage:
//    preview.html              → shows scenario picker
//    preview.html?s=JAH+IPH+ERE → jumps directly to that scenario
// ═══════════════════════════════════════════════════════════════

let cfg = null;
let scenario = {};
let scenarioCode = '';
let pages = [];
let currentPage = 0;
let responses = {};
let assignmentId = null;

// ── Boot ─────────────────────────────────────────────────────────
async function boot() {
  try {
    const res = await fetch('config.json');
    cfg = await res.json();
    document.title = '[前測] ' + (cfg.study.title || '學術問卷');
    document.getElementById('loading').style.display = 'none';

    const params = new URLSearchParams(window.location.search);
    const presetCode = params.get('s');
    if (presetCode) {
      startPreview(presetCode);
    } else {
      showPicker();
    }
  } catch (e) {
    document.getElementById('loading').textContent = '載入失敗，請重新整理頁面。';
    console.error(e);
  }
}

// ── Scenario Picker ───────────────────────────────────────────────
function showPicker() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('banner-code').textContent = '—';

  const combos = generateCombinations();
  const total = combos.length;

  let html = `
    <div class="picker-header">
      <h1>前測預覽工具</h1>
      <p>選擇任一腳本組合，完整預覽對應版本之問卷。<br>填答資料不會送出至試算表。</p>
    </div>
    <div class="combo-grid">`;

  combos.forEach((combo, idx) => {
    const code = combo.map(item => item.factorId + item.level.id).join('+');
    const encoded = encodeURIComponent(code);
    html += `
      <div class="combo-card">
        <div class="combo-num">腳本 ${idx + 1} / ${total}</div>
        <div class="combo-code">${code}</div>
        <div class="combo-factors">`;
    combo.forEach(item => {
      html += `<div class="combo-factor">
        <span class="factor-name">${item.factorName}</span>
        <span class="factor-level">${item.level.label}</span>
      </div>`;
    });
    html += `</div>
        <div class="combo-actions">
          <button class="btn-start" onclick="startPreview('${code}')">開始預覽 →</button>
          <button class="btn-link" onclick="copyLink('${encoded}')">複製連結</button>
        </div>
      </div>`;
  });

  html += `</div>`;
  document.getElementById('picker').innerHTML = html;
  document.getElementById('picker').style.display = 'block';
}

// Cartesian product of all factor levels
function generateCombinations() {
  let result = [[]];
  cfg.factors.forEach(factor => {
    const next = [];
    result.forEach(combo => {
      factor.levels.forEach(lvl => {
        next.push([...combo, { factorId: factor.id, factorName: factor.name, level: lvl }]);
      });
    });
    result = next;
  });
  return result;
}

// ── Start preview for a specific scenario code ────────────────────
function startPreview(code) {
  parseConditionCode(code);
  scenarioCode = code;

  document.getElementById('picker').style.display = 'none';
  document.getElementById('banner-code').textContent = code;

  // Reset all survey state
  currentPage = 0;
  responses = {};
  assignmentId = null;
  pages = [];

  buildPages();
  document.getElementById('app').style.display = 'block';
  renderPage();
}

// ── Parse condition code → scenario object ────────────────────────
function parseConditionCode(code) {
  scenario = {};
  code.split('+').forEach(part => {
    cfg.factors.forEach(f => {
      if (part.startsWith(f.id)) {
        const levelId = part.slice(f.id.length);
        const level = f.levels.find(l => l.id === levelId);
        if (level) scenario[f.id] = level;
      }
    });
  });
}

// ── Page list (identical to index.html) ──────────────────────────
function buildPages() {
  pages = [];
  pages.push({ type: 'cover' });

  const factorMap = {};
  cfg.factors.forEach(f => factorMap[f.id] = f);

  const scaleMap = {};
  (cfg.scales || []).forEach(s => scaleMap[s.id] = s);
  if (cfg.outcome_scale && !cfg.scales) scaleMap[cfg.outcome_scale.id] = cfg.outcome_scale;

  const order = cfg.survey_order || [
    ...cfg.factors.map(f => f.id),
    ...(cfg.scales || (cfg.outcome_scale ? [cfg.outcome_scale] : [])).map(s => s.id)
  ];

  order.forEach(id => {
    if (factorMap[id])  pages.push({ type: 'factor', factor: factorMap[id] });
    else if (scaleMap[id]) pages.push({ type: 'scale', scale: scaleMap[id] });
  });

  pages.push({ type: 'demographics' });
  pages.push({ type: 'thankyou' });
}

// ── Render dispatcher (identical to index.html) ───────────────────
function renderPage() {
  const p = pages[currentPage];
  const content = document.getElementById('survey-content');

  document.getElementById('progress-bar').style.width =
    Math.min(100, Math.round((currentPage / (pages.length - 1)) * 100)) + '%';
  document.getElementById('progress-label').textContent =
    p.type === 'thankyou' ? '' : `第 ${currentPage + 1} 頁，共 ${pages.length - 1} 頁`;

  const nav = document.getElementById('nav-wrap');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');

  btnPrev.style.display = (currentPage === 0 || p.type === 'thankyou') ? 'none' : 'inline-block';
  nav.style.display = p.type === 'thankyou' ? 'none' : 'flex';
  btnNext.textContent = p.type === 'demographics' ? '送出問卷 ✓' : '下一頁 →';
  hideError();

  switch (p.type) {
    case 'cover':        content.innerHTML = renderCover();        break;
    case 'factor':       content.innerHTML = renderFactor(p.factor); break;
    case 'scale':        content.innerHTML = renderScale(p.scale);  break;
    case 'demographics': content.innerHTML = renderDemographics();  break;
    case 'thankyou':     content.innerHTML = renderThankyou();      break;
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
  restoreResponses(p);
}

// ── Cover (identical) ─────────────────────────────────────────────
function renderCover() {
  const s = cfg.study;
  const c = cfg.cover;
  return `
  <div class="card">
    <div class="cover-header">
      <div class="cover-title">${s.name}</div>
      <div class="cover-meta">${s.institution}<br>${s.advisor} 指導 ／ ${s.researcher} 撰</div>
    </div>
    <div class="cover-body">${c.body}</div>
    <div class="cover-body">${c.privacy}</div>
    <div class="cover-reminder">再次提醒：<br>${c.reminder}</div>
    <div style="margin-top:20px;font-size:13px;color:#888;text-align:right">
      聯絡電話：${s.contact_phone}　聯絡信箱：${s.contact_email}
    </div>
  </div>`;
}

// ── Factor page (identical) ───────────────────────────────────────
function renderFactor(f) {
  const lvl = scenario[f.id];
  let html = `<div class="card">
    <div class="part-label">${f.part_title}</div>
    <h2>請先閱讀完以下故事情境，再依據其內容回答後續題項。</h2>`;

  if (f.scenario_shared) {
    html += `<div class="scenario-box">${f.scenario_shared.replace(/\n/g, '<br>')}</div>`;
  }

  if (f.manipulation_type === 'task_then_scale') {
    html += `
    <div class="task-box">
      <div class="task-title">任　務　敘　述</div>
      <div class="task-description">${lvl.task_description}</div>
      <div class="task-note">${f.task_note}</div>
      ${lvl.task_fields.map((tf, i) => `
        <div class="task-field">
          <label for="task_${f.id}_${i}">${tf.label}：</label>
          <input type="text" id="task_${f.id}_${i}" name="task_${f.id}_${i}"
            ${tf.required ? '' : 'placeholder="（選填）"'} autocomplete="off">
          ${tf.note ? `<span class="opt-note">（${tf.note}）</span>` : ''}
        </div>`).join('')}
    </div>`;
  } else {
    html += `<div class="scenario-box">${lvl.scenario.replace(/\n/g, '<br>')}</div>`;
  }

  html += `<div class="instruction">根據上述之故事情境，並「假設您是${cfg.study.protagonist}」，填答以下題項。</div>`;
  html += renderLikertItems(f.check_items, f.check_scale, `mc_${f.id}`);
  html += `</div>`;
  return html;
}

// ── Scale page (identical) ────────────────────────────────────────
function renderScale(sc) {
  let html = `<div class="card">
    <div class="part-label">${sc.part_title}</div>
    <h2>${sc.header_instruction}</h2>`;
  if (sc.preamble) {
    html += `<div class="scenario-box" style="font-size:14px">${sc.preamble.replace(/\n/g, '<br>')}</div>`;
  }
  html += `<div class="instruction">${sc.check_instruction}</div>`;
  html += renderLikertItems(sc.items, sc.scale, sc.id.toLowerCase());
  html += `</div>`;
  return html;
}

// ── Likert helper (identical) ─────────────────────────────────────
function renderLikertItems(items, scale, prefix) {
  return items.map((item, i) => {
    const name = `${prefix}_${i + 1}`;
    const opts = Array.from({ length: scale.points }, (_, k) => {
      const val = k + 1;
      const lbl = scale.labels[k] || val;
      return `
        <div class="likert-option">
          <input type="radio" name="${name}" id="${name}_${val}" value="${val}">
          <label for="${name}_${val}">
            <div class="radio-circle">${val}</div>
            <div class="radio-label">${lbl}</div>
          </label>
        </div>`;
    }).join('');
    return `
      <div class="likert-item">
        <div class="likert-question"><span class="q-num">${i + 1}.</span> ${item}</div>
        <div class="likert-options">${opts}</div>
      </div>`;
  }).join('');
}

// ── Demographics (identical) ──────────────────────────────────────
function renderDemographics() {
  const d = cfg.demographics;
  let html = `<div class="card">
    <div class="part-label">${d.part_title}</div>
    <h2>${d.instruction}</h2>`;

  const monthField = d.fields.find(f => f.id === 'work_months');
  d.fields.forEach(f => {
    if (f.id === 'work_months') return;
    html += `<div class="demo-field">`;
    if (f.label) html += `<span class="demo-label">${f.label}</span>`;
    if (f.type === 'number') {
      html += `<input type="number" id="${f.id}" name="${f.id}"
        min="${f.min || 0}" max="${f.max || 100}" ${f.required ? 'required' : ''}>
        <span class="demo-unit">${f.unit}</span>`;
      if (f.id === 'work_years' && monthField) {
        html += `&nbsp;&nbsp;
          <input type="number" id="${monthField.id}" name="${monthField.id}"
            min="0" max="11" ${monthField.required ? 'required' : ''}>
          <span class="demo-unit">${monthField.unit}</span>`;
      }
    } else if (f.type === 'radio') {
      html += `<div class="radio-group">`;
      f.options.forEach((opt, i) => {
        const rid = `${f.id}_${i}`;
        html += `<div class="radio-chip">
          <input type="radio" name="${f.id}" id="${rid}" value="${opt}" ${f.required ? 'required' : ''}>
          <label for="${rid}">${opt}</label>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}

// ── Thankyou (preview version with restart buttons) ───────────────
function renderThankyou() {
  return `<div class="card">
    <div class="thankyou-wrap">
      <h2>前測預覽完成</h2>
      <p>腳本：<strong style="font-family:monospace;color:#5a7a6a">${scenarioCode}</strong></p>
      <p style="margin-top:8px;color:#aaa;font-size:13px">（前測模式：資料未送出至試算表）</p>
      <div class="preview-actions">
        <button onclick="startPreview('${scenarioCode}')">重新預覽此腳本</button>
        <button class="btn-back-picker" onclick="showPicker()">返回腳本選單</button>
      </div>
    </div>
  </div>`;
}

// ── Navigation (identical) ────────────────────────────────────────
function nextPage() {
  if (!validatePage()) { showError(); return; }
  saveResponses();
  if (pages[currentPage].type === 'demographics') {
    submitSurvey();
  } else {
    currentPage++;
    renderPage();
  }
}
function prevPage() {
  if (currentPage > 0) { saveResponses(); currentPage--; renderPage(); }
}

// ── Validation (identical) ────────────────────────────────────────
function validatePage() {
  const p = pages[currentPage];
  if (p.type === 'cover') return true;

  if (p.type === 'factor') {
    const f = p.factor;
    for (let i = 0; i < f.check_items.length; i++) {
      if (!document.querySelector(`input[name="mc_${f.id}_${i + 1}"]:checked`)) return false;
    }
    if (f.manipulation_type === 'task_then_scale') {
      const lvl = scenario[f.id];
      for (let i = 0; i < lvl.task_fields.length; i++) {
        if (lvl.task_fields[i].required) {
          const inp = document.getElementById(`task_${f.id}_${i}`);
          if (!inp || !inp.value.trim()) return false;
        }
      }
    }
    return true;
  }

  if (p.type === 'scale') {
    const sc = p.scale;
    const prefix = sc.id.toLowerCase();
    for (let i = 0; i < sc.items.length; i++) {
      if (!document.querySelector(`input[name="${prefix}_${i + 1}"]:checked`)) return false;
    }
    return true;
  }

  if (p.type === 'demographics') {
    for (const f of cfg.demographics.fields) {
      if (!f.required) continue;
      if (f.type === 'number') {
        const el = document.getElementById(f.id);
        if (!el || el.value === '') return false;
      } else if (f.type === 'radio') {
        if (!document.querySelector(`input[name="${f.id}"]:checked`)) return false;
      }
    }
    return true;
  }

  return true;
}

function showError() {
  const el = document.getElementById('error-msg');
  el.style.display = 'inline';
  setTimeout(() => el.style.display = 'none', 3000);
}
function hideError() { document.getElementById('error-msg').style.display = 'none'; }

// ── Save / Restore responses (identical) ─────────────────────────
function saveResponses() {
  const p = pages[currentPage];
  if (p.type === 'factor') {
    const f = p.factor;
    f.check_items.forEach((_, i) => {
      const name = `mc_${f.id}_${i + 1}`;
      const checked = document.querySelector(`input[name="${name}"]:checked`);
      if (checked) responses[name] = checked.value;
    });
    if (f.manipulation_type === 'task_then_scale') {
      const lvl = scenario[f.id];
      lvl.task_fields.forEach((_, i) => {
        const el = document.getElementById(`task_${f.id}_${i}`);
        if (el) responses[`task_${f.id}_${i}`] = el.value;
      });
    }
  }
  if (p.type === 'scale') {
    const sc = p.scale;
    const prefix = sc.id.toLowerCase();
    sc.items.forEach((_, i) => {
      const checked = document.querySelector(`input[name="${prefix}_${i + 1}"]:checked`);
      if (checked) responses[`${prefix}_${i + 1}`] = checked.value;
    });
  }
  if (p.type === 'demographics') {
    cfg.demographics.fields.forEach(f => {
      if (f.type === 'number') {
        const el = document.getElementById(f.id);
        if (el) responses[f.id] = el.value;
      } else if (f.type === 'radio') {
        const checked = document.querySelector(`input[name="${f.id}"]:checked`);
        if (checked) responses[f.id] = checked.value;
      }
    });
  }
}

function restoreResponses(p) {
  if (!p) return;
  setTimeout(() => {
    if (p.type === 'factor') {
      const f = p.factor;
      f.check_items.forEach((_, i) => {
        const name = `mc_${f.id}_${i + 1}`;
        if (responses[name]) {
          const el = document.getElementById(`${name}_${responses[name]}`);
          if (el) el.checked = true;
        }
      });
      if (f.manipulation_type === 'task_then_scale') {
        const lvl = scenario[f.id];
        lvl.task_fields.forEach((_, i) => {
          const el = document.getElementById(`task_${f.id}_${i}`);
          if (el && responses[`task_${f.id}_${i}`]) el.value = responses[`task_${f.id}_${i}`];
        });
      }
    }
    if (p.type === 'scale') {
      const sc = p.scale;
      const prefix = sc.id.toLowerCase();
      sc.items.forEach((_, i) => {
        const key = `${prefix}_${i + 1}`;
        if (responses[key]) {
          const el = document.getElementById(`${key}_${responses[key]}`);
          if (el) el.checked = true;
        }
      });
    }
    if (p.type === 'demographics') {
      cfg.demographics.fields.forEach(f => {
        if (f.type === 'number') {
          const el = document.getElementById(f.id);
          if (el && responses[f.id] !== undefined) el.value = responses[f.id];
        } else if (f.type === 'radio') {
          const checked = document.querySelector(`input[name="${f.id}"][value="${responses[f.id]}"]`);
          if (checked) checked.checked = true;
        }
      });
    }
  }, 50);
}

// ── Submit (preview: no data sent) ───────────────────────────────
async function submitSurvey() {
  saveResponses();
  currentPage++;
  renderPage();
  showToast('前測模式：資料未送出至試算表。');
}

// ── Toast ─────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ── Copy shareable preview link ───────────────────────────────────
function copyLink(encodedCode) {
  const url = location.origin + location.pathname + '?s=' + encodedCode;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('連結已複製！'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('連結已複製！');
  }
}

// ── Start ────────────────────────────────────────────────────────
boot();
</script>
